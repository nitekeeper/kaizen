[pytest]
testpaths = tests
# `-m "not live"` deselects the real-`claude` live e2e by default — it is opt-in
# via `pytest -m live`. THIS file is kaizen's active pytest config (pyproject's
# [tool.pytest.ini_options] is IGNORED when pytest.ini exists), so the marker +
# deselect MUST live here, not in pyproject.
addopts = -q --tb=short -m "not live"
markers =
    live: hits the real claude CLI / network — deselected by default (run with `pytest -m live`)
